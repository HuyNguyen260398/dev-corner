name: CI

# Runs on every pull request (opened, updated with new commits, or reopened).
on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel superseded runs when a PR is updated with new commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to majors whose runtime is Node 24, per the Node 20
      # deprecation on GitHub Actions runners. pnpm is provided by Corepack
      # (not pnpm/action-setup), and dependency caching uses setup-node's
      # built-in pnpm cache instead of actions/cache.
      - name: Checkout
        uses: actions/checkout@v5

      # Corepack activates the pnpm version pinned in package.json#packageManager.
      # Enabled before setup-node so `cache: pnpm` can resolve the pnpm store.
      - name: Enable Corepack
        run: corepack enable

      # node-version-file reads .nvmrc (Node 24). pnpm 11 requires Node >= 22.13.
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Each check runs independently (continue-on-error) so the summary below
      # reports every check's result even when an earlier one fails. The final
      # gate step then fails the job if any check did not pass.
      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint

      - name: Type check
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck

      - name: Test
        id: test
        continue-on-error: true
        run: pnpm test

      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build

      - name: Job summary
        if: always()
        env:
          LINT: ${{ steps.lint.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          TEST: ${{ steps.test.outcome }}
          BUILD: ${{ steps.build.outcome }}
        run: |
          status() {
            case "$1" in
              success) echo "✅ Passed" ;;
              skipped) echo "⏭️ Skipped" ;;
              *)       echo "❌ Failed" ;;
            esac
          }
          {
            echo "## CI results"
            echo ""
            echo "| Check | Status |"
            echo "| --- | --- |"
            echo "| Lint | $(status "$LINT") |"
            echo "| Type check | $(status "$TYPECHECK") |"
            echo "| Test | $(status "$TEST") |"
            echo "| Build | $(status "$BUILD") |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Gate on check results
        if: always()
        env:
          LINT: ${{ steps.lint.outcome }}
          TYPECHECK: ${{ steps.typecheck.outcome }}
          TEST: ${{ steps.test.outcome }}
          BUILD: ${{ steps.build.outcome }}
        run: |
          failed=false
          for check in LINT TYPECHECK TEST BUILD; do
            if [ "${!check}" != "success" ]; then
              echo "::error::$check did not pass (outcome: ${!check})"
              failed=true
            fi
          done
          [ "$failed" = false ]
